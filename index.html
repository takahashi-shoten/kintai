<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="勤怠">
<meta name="theme-color" content="#0d6e4f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>高橋商店 勤怠管理</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --primary:#0d6e4f;
    --primary-dark:#0a553d;
    --accent:#f59e0b;
    --bg:#f4f6f8;
    --card:#ffffff;
    --line:#dce1e6;
    --text:#1b2733;
    --muted:#5b6b7a;
    --danger:#d33;
    --off:#8a93a0;
    --half:#2563eb;
    --radius:14px;
  }
  html,body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    font-size:18px;line-height:1.5;-webkit-text-size-adjust:100%}
  body{padding-bottom:env(safe-area-inset-bottom)}
  #app{max-width:560px;margin:0 auto;min-height:100vh}

  header.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;
    background:var(--primary);color:#fff;padding:14px 14px;padding-top:calc(14px + env(safe-area-inset-top));
    font-size:20px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.15)}
  header.bar .back{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:18px;
    padding:8px 12px;border-radius:10px;font-weight:700}
  header.bar .title{flex:1;text-align:center;padding-right:48px}
  .wrap{padding:16px}

  /* ホームのタイル */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 12px;text-align:center;font-size:20px;font-weight:700;color:var(--text);
    box-shadow:0 1px 3px rgba(0,0,0,.06);min-height:120px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;cursor:pointer}
  .tile.big{grid-column:1 / -1;background:var(--primary);color:#fff;border:none;font-size:24px;min-height:140px}
  .tile .ic{font-size:40px;line-height:1}
  .tile small{font-size:14px;font-weight:500;color:var(--muted)}
  .tile.big small{color:rgba(255,255,255,.85)}

  .btn{display:block;width:100%;border:none;border-radius:var(--radius);
    padding:18px;font-size:21px;font-weight:700;color:#fff;background:var(--primary);
    margin-top:14px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.accent{background:var(--accent)}
  .btn.ghost{background:#fff;color:var(--primary);border:2px solid var(--primary)}
  .btn.danger{background:#fff;color:var(--danger);border:2px solid var(--danger);font-size:18px}
  .btn.sm{padding:12px;font-size:17px;margin-top:0}
  /* 上部の大きなマイクボタン */
  .mic-big{display:flex;align-items:center;justify-content:center;gap:12px;
    background:var(--accent);color:#fff;font-size:26px;padding:26px 16px;
    box-shadow:0 4px 0 #c47f08;margin-top:4px}
  .mic-big .mi{font-size:34px;line-height:1}
  .mic-big:active{transform:translateY(3px);box-shadow:0 1px 0 #c47f08}
  .mic-big.listening{background:var(--accent);box-shadow:0 4px 0 #c47f08;animation:micpulse 1.4s ease-in-out infinite}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.55}}
  .mic-hint{margin:8px 0 4px}

  label{display:block;font-size:15px;font-weight:700;color:var(--muted);margin:16px 0 6px}
  input,select,textarea{width:100%;font-size:20px;padding:14px;border:2px solid var(--line);
    border-radius:12px;background:#fff;color:var(--text);font-family:inherit}
  input:focus,select,textarea:focus{outline:none;border-color:var(--primary)}
  textarea{resize:vertical}
  .voice{min-height:140px;font-size:23px;border-width:3px;border-color:var(--accent);background:#fffdf6}
  .btn.ghost.listening{background:var(--danger);color:#fff;border-color:var(--danger)}
  .hint{font-size:13px;color:var(--muted);margin-top:6px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* 出勤区分ボタン */
  .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px}
  .seg button{padding:16px 4px;font-size:19px;font-weight:700;border:2px solid var(--line);
    background:#fff;color:var(--muted);border-radius:12px}
  .seg button.on[data-v="present"]{background:var(--primary);color:#fff;border-color:var(--primary)}
  .seg button.on[data-v="half"]{background:var(--half);color:#fff;border-color:var(--half)}
  .seg button.on[data-v="off"]{background:var(--off);color:#fff;border-color:var(--off)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-top:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card h3{font-size:16px;color:var(--muted);margin-bottom:10px}

  /* 一覧 */
  .rec{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);
    border-left:6px solid var(--primary);border-radius:12px;padding:12px 14px;margin-top:10px;cursor:pointer}
  .rec.off{border-left-color:var(--off);opacity:.85}
  .rec.half{border-left-color:var(--half)}
  .rec .d{display:flex;justify-content:space-between;align-items:baseline}
  .rec .date{font-size:19px;font-weight:700}
  .rec .badge{font-size:13px;font-weight:700;padding:3px 9px;border-radius:999px;color:#fff;background:var(--primary)}
  .rec.off .badge{background:var(--off)} .rec.half .badge{background:var(--half)}
  .rec .site{font-size:18px;margin-top:4px}
  .rec .meta{font-size:14px;color:var(--muted);margin-top:4px}

  /* 集計 */
  .stat{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat .box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .stat .box .v{font-size:28px;font-weight:800;color:var(--primary)}
  .stat .box .l{font-size:14px;color:var(--muted);margin-top:2px}
  .stat .box.wide{grid-column:1 / -1}

  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
  th,td{border:1px solid var(--line);padding:7px 6px;text-align:right;white-space:nowrap}
  th{background:#eef2f4;color:var(--muted);font-size:13px}
  td.l,th.l{text-align:left;white-space:normal}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:17px}
  .monthsel{display:flex;align-items:center;gap:10px;margin-top:8px}
  .monthsel select{flex:1}
  .saved-msg{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1b2733;
    color:#fff;padding:14px 22px;border-radius:999px;font-size:17px;font-weight:700;z-index:50;
    box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .footnote{font-size:12px;color:var(--muted);text-align:center;margin:24px 0 16px}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   高橋商店 勤怠管理アプリ（最小機能版 / 単一HTML PWA）
   - データ保存は localStorage（下の Store がデータ層の抽象化）
   - 将来 Firebase(Firestore) へ移行する場合は Store の中身だけ差し替える
     ことを想定し、メソッドは async（Promise）で統一しています。
   ===================================================================== */

/* ---------- 共通ユーティリティ ---------- */
function $(sel, root){ return (root||document).querySelector(sel); }
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function pad2(n){ return String(n).padStart(2,'0'); }

// 日付ユーティリティ（ローカル時間ベース）
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
}
function ymOf(dateStr){ return (dateStr||'').slice(0,7); } // YYYY-MM
const WD=['日','月','火','水','木','金','土'];
function fmtDate(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const wd=WD[new Date(y,m-1,d).getDay()];
  return `${m}/${d}(${wd})`;
}
function nowIso(){ return new Date().toISOString(); }
function fmtDateTime(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function yen(n){ return '¥'+(Number(n)||0).toLocaleString('ja-JP'); }

// 時間計算
function timeToMin(t){
  if(!t) return null;
  const p=t.split(':'); if(p.length<2) return null;
  return Number(p[0])*60+Number(p[1]);
}
function workMinutes(rec){
  if(rec.workStatus==='off') return 0;
  const s=timeToMin(rec.startTime), e=timeToMin(rec.endTime);
  if(s==null||e==null) return 0;
  let diff=e-s; if(diff<0) diff+=24*60; // 日付またぎの保険
  diff-=(Number(rec.breakMinutes)||0);
  return Math.max(0,diff);
}
function fmtMin(min){
  const h=Math.floor(min/60), m=min%60;
  if(min<=0) return '0時間';
  return h+'時間'+(m? m+'分':'');
}
function dayValue(status){ return status==='present'?1 : status==='half'?0.5 : 0; }
const STATUS_LABEL={present:'出勤',half:'半日',off:'休み'};

// 残業時間自動算出
// 18:59まで→0 / 19:00〜19:24→1.0h / 19:25〜19:54→1.5h / 以降30分刻みで+0.5h
function calcOvertime(endTimeStr){
  const end=timeToMin(endTimeStr);
  if(!end || end<19*60) return 0;       // 〜18:59 は残業なし
  const over=end-19*60;                  // 19:00 からの超過分（分）
  if(over<=24) return 1;
  return 1.5+Math.floor((over-25)/30)*0.5;
}

/* =====================================================================
   音声入力テキストの解析
   例:「砂川市 明山邸 8時から18時 交通費5000円 遠方経費2000円」
   例:「札幌 佐藤邸 8時 17時半 交通費2000円」
   例:「東6条 現場 休み」
   ===================================================================== */
function toHalfWidth(str){
  return String(str)
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/　/g,' ')
    .replace(/[，、､]/g,' ');
}
function parseYen(str){ return parseInt(String(str).replace(/[, ]/g,''),10)||0; }

function parseVoiceInput(text){
  const res={ siteName:'', startTime:'', endTime:'', breakMinutes:120,
              transportCost:0, remoteCost:0, memo:'', workStatus:'present' };
  if(!text || !text.trim()) return res;
  const s = toHalfWidth(text.trim());
  let rem = s;
  const strip = (sub)=>{ if(sub) rem = rem.replace(sub,' '); };

  // 交通費
  let m = s.match(/交通費\s*([0-9,]+)\s*円?/);
  if(m){ res.transportCost=parseYen(m[1]); strip(m[0]); }

  // 遠方経費 / 遠方
  m = s.match(/(?:遠方経費|遠方費|遠方)\s*([0-9,]+)\s*円?/);
  if(m){ res.remoteCost=parseYen(m[1]); strip(m[0]); }

  // 休憩（任意）: 休憩1時間 / 休憩45分 / 休憩1時間30分
  m = s.match(/休憩\s*(?:([0-9]+)\s*時間)?\s*(?:([0-9]+)\s*分)?/);
  if(m && (m[1]||m[2])){
    res.breakMinutes=(parseInt(m[1]||0,10)*60)+parseInt(m[2]||0,10);
    strip(m[0]);
  }

  // 出勤区分
  if(/半日|半休/.test(s)){ res.workStatus='half'; }
  else if(/全休|休み|休暇|お休み|やすみ/.test(s) || /(?:^|\s)休(?:\s|$)/.test(s)){ res.workStatus='off'; }
  rem = rem.replace(/半日|半休|全休|お休み|やすみ|休暇|休み/g,' ');

  // 時間（開始・終了）: 8時 / 18時 / 17時半 / 8時30分 / 8:00 / 午後5時半
  // 分は「時」または「:」の直後のみ取る（空白をまたいで次の数字を拾わない）
  const timeRe=/(午前|午後)?\s*([0-9]{1,2})(?::([0-5][0-9])|時(半|[0-9]{1,2}分)?)/g;
  const times=[]; let tm;
  while((tm=timeRe.exec(s))!==null){
    let hh=parseInt(tm[2],10), mm=0;
    if(tm[3]!=null && tm[3]!=='') mm=parseInt(tm[3],10);          // コロン形式 8:30
    else if(tm[4]==='半') mm=30;                                  // 8時半
    else if(tm[4]!=null && tm[4]!=='') mm=parseInt(tm[4],10);     // 8時30分
    if(tm[1]==='午後' && hh<12) hh+=12;
    if(tm[1]==='午前' && hh===12) hh=0;
    if(hh>23 || mm>59) continue;
    times.push({txt:tm[0], v:pad2(hh)+':'+pad2(mm)});
  }
  if(times[0]){ res.startTime=times[0].v; strip(times[0].txt); }
  if(times[1]){ res.endTime=times[1].v; strip(times[1].txt); }

  // 現場名 = 残り（接続語・記号を除去）
  rem = rem
    .replace(/から|まで|くらい|ぐらい|頃|ごろ/g,' ')
    .replace(/[〜～\-ー]/g,' ')
    .replace(/円/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  res.siteName = rem;

  return res;
}

/* =====================================================================
   データ層（localStorage 実装）
   ※ 将来 Firestore へ移行する場合は、この Store オブジェクトのメソッド
     （getAll / getByMonth / get / save / remove / settings）の中身だけを
     Firestore 呼び出しに置き換えれば、画面側のコードは変更不要です。
   ===================================================================== */
const Store = {
  KEY: 'kintai_records_v1',
  SETTINGS_KEY: 'kintai_settings_v1',

  _read(){
    try { return JSON.parse(localStorage.getItem(this.KEY)) || []; }
    catch(e){ return []; }
  },
  _write(list){ localStorage.setItem(this.KEY, JSON.stringify(list)); },

  async getAll(){
    return this._read().slice().sort((a,b)=>
      a.date<b.date?1 : a.date>b.date?-1 : (a.createdAt<b.createdAt?1:-1));
  },
  async getByMonth(ym){ return (await this.getAll()).filter(r=>ymOf(r.date)===ym); },
  async get(id){ return this._read().find(r=>r.id===id) || null; },

  async save(rec){
    const list=this._read();
    if(rec.id){
      const i=list.findIndex(r=>r.id===rec.id);
      if(i>=0){ rec.updatedAt=nowIso(); rec.createdAt=list[i].createdAt; list[i]=rec; }
      else { list.push(rec); }
    } else {
      rec.id = 'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      rec.createdAt = nowIso();
      rec.updatedAt = rec.createdAt;
      list.push(rec);
    }
    this._write(list);
    return rec;
  },
  async remove(id){ this._write(this._read().filter(r=>r.id!==id)); },

  // 設定（既定の従業員名など）
  _settings(){ try{ return JSON.parse(localStorage.getItem(this.SETTINGS_KEY))||{}; }catch(e){ return {}; } },
  async getSetting(k, def){ const v=this._settings()[k]; return v==null?def:v; },
  async setSetting(k,v){ const s=this._settings(); s[k]=v; localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(s)); },

  // 従業員マスター
  EMPLOYEES_KEY: 'kintai_employees_v1',
  _readEmps(){ try{ return JSON.parse(localStorage.getItem(this.EMPLOYEES_KEY))||[]; }catch(e){ return []; } },
  _writeEmps(list){ localStorage.setItem(this.EMPLOYEES_KEY, JSON.stringify(list)); },
  async getEmployees(){ return this._readEmps().slice().sort((a,b)=> a.name<b.name?-1:1); },
  async saveEmployee(emp){
    const list=this._readEmps();
    if(emp.id){
      const i=list.findIndex(e=>e.id===emp.id);
      if(i>=0){ list[i]=emp; } else { list.push(emp); }
    } else {
      emp.id='e_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      list.push(emp);
    }
    this._writeEmps(list); return emp;
  },
  async removeEmployee(id){ this._writeEmps(this._readEmps().filter(e=>e.id!==id)); },
  async getEmployeeWage(name){
    const e=this._readEmps().find(e=>e.name===name);
    return e ? (Number(e.dailyWage)||0) : 0;
  },
  async clearAllRecords(){ this._write([]); }
};

/* =====================================================================
   画面（ルーター）
   ===================================================================== */
const App = { editId:null };

function go(path){ location.hash = path; }
function currentRoute(){ return (location.hash||'#/').replace(/^#/,'').split('?')[0] || '/'; }

function toast(msg){
  const el=document.createElement('div');
  el.className='saved-msg'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1600);
}

function header(title, showBack){
  return `<header class="bar">
    ${showBack?`<button class="back" id="backBtn">← 戻る</button>`:`<span style="width:1px"></span>`}
    <span class="title">${escapeHtml(title)}</span>
  </header>`;
}

async function render(){
  const route=currentRoute();
  const app=$('#app');
  if(route==='/entry')      await viewEntry(app);
  else if(route==='/list')  await viewList(app);
  else if(route==='/summary') await viewSummary(app);
  else if(route==='/boss')  await viewBoss(app);
  else if(route==='/admin') await viewAdmin(app);
  else if(route==='/employees') await viewEmployees(app);
  else                      await viewHome(app);
  const back=$('#backBtn'); if(back) back.onclick=()=>go('/');
  window.scrollTo(0,0);
}

/* ---------- 暗証番号ヘルパー ---------- */
async function checkPin(settingKey, promptMsg){
  const pin = await Store.getSetting(settingKey, '');
  if(!pin) return true; // 未設定なら無条件で通す
  const entered = prompt(promptMsg);
  if(entered === null) return false;
  if(entered === pin) return true;
  toast('暗証番号が違います');
  return false;
}

/* ---------- ホーム ---------- */
function todayStrLabel(){ return fmtDate(todayStr()); }

async function viewHome(app){
  const name=await Store.getSetting('employeeName','');
  app.innerHTML = header('高橋商店 勤怠管理', false) + `
    <div class="wrap">
      <div class="tiles">
        <div class="tile big" data-go="/entry">
          <span class="ic">🎤</span>今日の勤怠を入力
          <small>${todayStrLabel()}</small>
        </div>
        <div class="tile" data-go="/list"><span class="ic">📋</span>月別一覧</div>
        <div class="tile" data-go="/summary"><span class="ic">📊</span>月別集計</div>
      </div>
      <div class="card">
        <h3>従業員名（この端末の既定）</h3>
        ${name
          ? `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
              <div>
                <div style="font-size:19px;font-weight:700">${escapeHtml(name)}</div>
                <div class="hint" style="margin-top:3px">変更は管理者のみ可能です</div>
              </div>
              <button class="btn ghost sm" id="changeNameBtn" style="width:auto">変更</button>
             </div>`
          : `<input id="empName" type="text" placeholder="例：高橋 太郎" value="">
             <div class="hint">入力後は固定されます。変更は管理者に依頼してください。</div>`}
      </div>
      <button class="btn ghost" id="bossBtn" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-size:18px;margin-top:14px">
        <span>👤 社長確認画面</span><span style="font-size:20px;opacity:.5">›</span>
      </button>
      <button class="btn ghost" id="adminBtn" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-size:18px;margin-top:10px;color:var(--muted);border-color:var(--muted)">
        <span>🔧 管理者画面</span><span style="font-size:20px;opacity:.5">›</span>
      </button>
      <p class="footnote">v2 ・ データはこの端末に保存されます</p>
    </div>`;
  app.querySelectorAll('[data-go]').forEach(el=> el.onclick=()=>go(el.dataset.go));
  if(name){
    $('#changeNameBtn').onclick = async () => {
      if(!await checkPin('adminPin', '管理者暗証番号を入力してください')) return;
      const newName = prompt('新しい従業員名を入力してください', name);
      if(newName === null || !newName.trim()) return;
      await Store.setSetting('employeeName', newName.trim());
      render();
    };
  } else {
    const emp=$('#empName');
    emp.onchange=()=> Store.setSetting('employeeName', emp.value.trim());
  }
  $('#bossBtn').onclick = async ()=>{
    if(await checkPin('bossPin', '社長確認画面の暗証番号を入力してください')) go('/boss');
  };
  $('#adminBtn').onclick = async ()=>{

  if(!rec){
    rec = { id:null, date:todayStr(), employeeName: await Store.getSetting('employeeName',''),
            siteName:'', startTime:'', endTime:'', breakMinutes:120, workStatus:'present',

  app.innerHTML = header(isEdit?'勤怠の修正':'勤怠入力', true) + `

      <div class="hint" id="micHint">入力欄を押すとキーボードが出ます。キーボードのマイク 🎤 を押して話すと、ここに文字が入り、自動で振り分けます。</div>
      <button class="btn accent sm" id="parseBtn" style="margin-top:10px">解析する（自動でも実行されます）</button>
      <button class="mic-big" id="micBtn" style="display:none;border-radius:var(--radius);border:none;cursor:pointer;width:100%;margin-top:10px"><span class="mi">🎙️</span><span id="micLabel">マイクで話す</span></button>

      <label>日付</label>
      <input id="f_date" type="date" value="${escapeHtml(rec.date)}">

      <label>従業員名</label>
      <select id="f_emp_sel" style="display:none"></select>
      <input id="f_emp" type="text" value="${escapeHtml(rec.employeeName)}" placeholder="例：高橋 太郎">

      <label>出勤区分</label>
      <div class="seg" id="segStatus">
        <button data-v="present">出勤</button>
        <button data-v="half">半日</button>
        <button data-v="off">休み</button>
      </div>

      <div id="detailFields">
        <label>現場名</label>
        <input id="f_site" type="text" value="${escapeHtml(rec.siteName)}" placeholder="例：砂川市 明山邸">

        <div class="row2">
          <div><label>開始時間</label><input id="f_start" type="time" value="${escapeHtml(rec.startTime)}"></div>
          <div><label>終了時間</label><input id="f_end" type="time" value="${escapeHtml(rec.endTime)}"></div>
        </div>
        <div class="row2">
          <div><label>休憩（分）</label><input id="f_break" type="number" inputmode="numeric" min="0" value="${Number(rec.breakMinutes)||0}"></div>
          <div><label>実働時間</label><input id="f_work" type="text" readonly value=""></div>
        </div>
        <div class="row2">
          <div><label>残業（時間）</label><input id="f_ot" type="number" inputmode="decimal" min="0" step="0.5" value="${rec.overtimeHours!=null?rec.overtimeHours:calcOvertime(rec.endTime)}"></div>
          <div><label>残業金額（円）</label><input id="f_otpay" type="text" readonly value=""></div>
        </div>
        <div class="row2">
          <div><label>交通費（円）</label><input id="f_trans" type="number" inputmode="numeric" min="0" value="${Number(rec.transportCost)||0}"></div>
          <div><label>遠方経費（円）</label><input id="f_remote" type="number" inputmode="numeric" min="0" value="${Number(rec.remoteCost)||0}"></div>
        </div>

        <label>メモ</label>
        <textarea id="f_memo" placeholder="任意">${escapeHtml(rec.memo)}</textarea>
      </div>

      <button class="btn" id="saveBtn">${isEdit?'修正を保存':'保存する'}</button>
      ${isEdit?`<button class="btn danger" id="delBtn">この記録を削除</button>
        <p class="footnote">登録：${fmtDateTime(rec.createdAt)} ／ 修正：${fmtDateTime(rec.updatedAt)}</p>`:''}
    </div>`;

  // 出勤区分セグメント
  let status = rec.workStatus || 'present';
  const seg = $('#segStatus');
  function paintSeg(){
    seg.querySelectorAll('button').forEach(b=> b.classList.toggle('on', b.dataset.v===status));
    // 休みのときは詳細フィールドを薄く（入力は可能だが任意）
    $('#detailFields').style.opacity = status==='off' ? .5 : 1;
    recalcWork();
  }
  seg.querySelectorAll('button').forEach(b=> b.onclick=()=>{ status=b.dataset.v; paintSeg(); });

  // 従業員セレクト（登録がある場合はドロップダウンで選択）
  const emps = await Store.getEmployees();
  const empSel = $('#f_emp_sel');
  const empInp = $('#f_emp');
  if(emps.length > 0){
    const isKnown = emps.some(e => e.name === rec.employeeName);
    empSel.innerHTML = '<option value="">名前を選んでください</option>' +
      emps.map(e => `<option value="${escapeHtml(e.name)}"${e.name===rec.employeeName?' selected':''}>${escapeHtml(e.name)}</option>`).join('') +
      '<option value="__manual__"'+(rec.employeeName&&!isKnown?' selected':'')+'>その他（直接入力）</option>';
    empSel.style.display = '';
    empInp.style.display = (rec.employeeName && isKnown) ? 'none' : '';
    empSel.onchange = () => {
      if(empSel.value === '__manual__' || empSel.value === ''){
        empInp.style.display = '';
        if(empSel.value === '') empInp.value = '';
      } else {
        empInp.value = empSel.value;
        empInp.style.display = 'none';
      }
      recalcOtPay();
    };
    empInp.addEventListener('input', recalcOtPay);
  }

  function getEmpWage(){
    const name = (empSel.style.display !== 'none' && empSel.value && empSel.value !== '__manual__')
      ? empSel.value : empInp.value.trim();
    const emp = emps.find(e => e.name === name);
    return emp ? Number(emp.dailyWage) || 0 : 0;
  }
  function recalcOtPay(){
    const otHours = Number($('#f_ot').value) || 0;
    const pay = Math.floor(otHours * (getEmpWage() / 8 * 1.25));
    $('#f_otpay').value = pay.toLocaleString('ja-JP');
  }

  function recalcWork(){
    const tmp={ workStatus:status, startTime:$('#f_start').value, endTime:$('#f_end').value, breakMinutes:Number($('#f_break').value)||0 };
    $('#f_work').value = fmtMin(workMinutes(tmp));
  }
  ['f_start','f_break'].forEach(id=> $('#'+id).addEventListener('input', recalcWork));
  $('#f_end').addEventListener('input', ()=>{
    recalcWork();
    $('#f_ot').value = calcOvertime($('#f_end').value);
    recalcOtPay();
  });
  $('#f_ot').addEventListener('input', recalcOtPay);
  paintSeg();
  recalcOtPay();

  // 解析処理（「解析」ボタン・入力欄のフォーカスアウト・音声認識終了から呼ぶ）
  let lastParsedText='';
  function runParse(opts){
    const silent = opts && opts.silent;
    const txt=$('#f_voice').value;
    if(!txt.trim()){ if(!silent) toast('入力欄に文章を入れてください'); return; }
    const p=parseVoiceInput(txt);
    if(p.siteName) $('#f_site').value=p.siteName;
    if(p.startTime) $('#f_start').value=p.startTime;
    if(p.endTime){ $('#f_end').value=p.endTime; $('#f_ot').value=calcOvertime(p.endTime); recalcOtPay(); }
    $('#f_break').value=p.breakMinutes;
    $('#f_trans').value=p.transportCost;
    $('#f_remote').value=p.remoteCost;
    status=p.workStatus; paintSeg();
    lastParsedText=txt;
    toast('解析しました。内容を確認してください');
  }
  $('#parseBtn').onclick=()=>runParse();

  const voice=$('#f_voice');
  const micHint=$('#micHint');

  // 画面を開いたら入力欄へ自動フォーカス（対応端末ではキーボードがすぐ開く）
  // ※iPhone Safari はセキュリティ上、画面遷移直後の自動表示が効かない場合があるため、
  //   その場合は大きな入力欄を1回タップすればキーボードが出る作りにしている。
  setTimeout(()=>{ try{ voice.focus({preventScroll:true}); }catch(e){ try{ voice.focus(); }catch(_){}}; }, 80);

  // 話し終えてフォーカスが外れたら自動で解析（手修正の上書き防止：本文が変わった時だけ）
  voice.addEventListener('blur', ()=>{
    const t=voice.value.trim();
    if(t && t!==lastParsedText) runParse();
  });

  // Web Speech API による音声入力（iPhone Safari 含む全端末対応）
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = $('#micBtn');
  if (SR) {
    micBtn.style.display = 'flex';
    micHint.innerHTML = 'マイクボタンを押して話すと音声が入力されます。もう一度押すと停止します。';

    let wantListening = false;
    let isRecognizing = false;
    let accText = '';
    let recog = null;

    function updateMicUI() {
      if (wantListening) {
        micBtn.classList.add('listening');
        $('#micLabel').textContent = '聞いています… (押すと停止)';
      } else {
        micBtn.classList.remove('listening');
        $('#micLabel').textContent = 'マイクで話す';
      }
    }

    function startRecog() {
      if (isRecognizing) return;
      recog = new SR();
      recog.lang = 'ja-JP';
      recog.continuous = false;
      recog.interimResults = true;
      recog.maxAlternatives = 1;

      recog.onstart = () => { isRecognizing = true; };
      recog.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) { accText += e.results[i][0].transcript; }
          else { interim += e.results[i][0].transcript; }
        }
        voice.value = accText + interim;
      };
      recog.onerror = (e) => {
        isRecognizing = false;
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          wantListening = false;
          updateMicUI();
          toast('マイクの使用が許可されていません');
        }
        // no-speech は onend でリスタートするため何もしない
      };
      recog.onend = () => {
        isRecognizing = false;
        if (wantListening) {
          setTimeout(startRecog, 300);  // 無音で切れても自動再起動
        } else {
          const t = voice.value.trim();
          if (t && t !== lastParsedText) runParse();
        }
      };

      try { recog.start(); }
      catch (err) {
        isRecognizing = false;
        wantListening = false;
        updateMicUI();
        toast('音声認識を開始できませんでした');
      }
    }

    micBtn.onclick = () => {
      if (wantListening) {
        wantListening = false;
        updateMicUI();
        if (isRecognizing && recog) { try { recog.stop(); } catch (e) {} }
      } else {
        wantListening = true;
        accText = voice.value ? voice.value.trim() + ' ' : '';
        updateMicUI();
        startRecog();
      }
    };
  }

  // 保存
  $('#saveBtn').onclick=async ()=>{
    const out={
      id: rec.id,
      date: $('#f_date').value || todayStr(),
      employeeName: $('#f_emp').value.trim() || '従業員',
      siteName: $('#f_site').value.trim(),
      startTime: $('#f_start').value,
      endTime: $('#f_end').value,
      breakMinutes: Number($('#f_break').value)||0,
      overtimeHours: Number($('#f_ot').value)||0,
      workStatus: status,
      transportCost: Number($('#f_trans').value)||0,
      remoteCost: Number($('#f_remote').value)||0,
      memo: $('#f_memo').value.trim()
    };
    if(status!=='off' && (!out.startTime || !out.endTime)){
      if(!confirm('開始・終了時間が未入力です。このまま保存しますか？')) return;
    }
    await Store.setSetting('employeeName', out.employeeName);
    await Store.save(out);
    App.editId=null;
    toast('保存しました');
    go('/list');
  };

  if(isEdit){
    $('#delBtn').onclick=async ()=>{
      if(!confirm('この記録を削除します。よろしいですか？')) return;
      await Store.remove(rec.id);
      App.editId=null;
      toast('削除しました');
      go('/list');
    };
  }
}

/* ---------- 集計（共通計算） ---------- */
function summarize(recs){
  const s={days:0, present:0, half:0, off:0, transport:0, remote:0, workMin:0, sites:{}};
  recs.forEach(r=>{
    s.days += dayValue(r.workStatus);
    if(r.workStatus==='present') s.present++;
    else if(r.workStatus==='half') s.half++;
    else s.off++;
    s.transport += Number(r.transportCost)||0;
    s.remote += Number(r.remoteCost)||0;
    s.workMin += workMinutes(r);
    if(r.workStatus!=='off'){
      const key=r.siteName||'（現場名なし）';
      const g = s.sites[key] || (s.sites[key]={days:0, transport:0, remote:0, workMin:0});
      g.days += dayValue(r.workStatus);
      g.transport += Number(r.transportCost)||0;
      g.remote += Number(r.remoteCost)||0;
      g.workMin += workMinutes(r);
    }
  });
  return s;
}

/* ---------- 社長用集計（日当含む） ---------- */
function summarizeBoss(recs, empWageMap){
  const s={days:0,present:0,half:0,off:0,transport:0,remote:0,workMin:0,sites:{},
           totalWage:0,totalPayment:0,totalOvertimeHours:0,totalOvertimePay:0,byEmployee:{}};
  recs.forEach(r=>{
    const dv=dayValue(r.workStatus);
    const dailyWage=empWageMap[r.employeeName]||0;
    const earned=dailyWage*dv;
    const trans=Number(r.transportCost)||0;
    const remote=Number(r.remoteCost)||0;
    const otHours=Number(r.overtimeHours)||0;
    const otPay=Math.floor(otHours*(dailyWage/8*1.25));
    s.days+=dv;
    if(r.workStatus==='present') s.present++;
    else if(r.workStatus==='half') s.half++;
    else s.off++;
    s.transport+=trans; s.remote+=remote; s.workMin+=workMinutes(r);
    s.totalWage+=earned; s.totalOvertimeHours+=otHours; s.totalOvertimePay+=otPay;
    s.totalPayment+=earned+trans+remote+otPay;
    if(r.workStatus!=='off'){
      const sk=r.siteName||'（現場名なし）';
      const g=s.sites[sk]||(s.sites[sk]={days:0,transport:0,remote:0,workMin:0});
      g.days+=dv; g.transport+=trans; g.remote+=remote; g.workMin+=workMinutes(r);
    }
    const ek=r.employeeName||'従業員';
    const e=s.byEmployee[ek]||(s.byEmployee[ek]={days:0,wage:0,transport:0,remote:0,overtimeHours:0,overtimePay:0,payment:0});
    e.days+=dv; e.wage+=earned; e.transport+=trans; e.remote+=remote;
    e.overtimeHours+=otHours; e.overtimePay+=otPay;
    e.payment+=earned+trans+remote+otPay;
  });
  return s;
}

/* ---------- CSV出力 ---------- */
function csvCell(v){
  const s=String(v==null?'':v);
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function exportCsv(recs, ym, empWageMap={}){
  const header=['日付','従業員名','現場名','開始時間','終了時間','休憩(分)','実働時間','出勤区分','日当','交通費','遠方経費','支給合計','メモ','登録日時','修正日時'];
  const lines=[header.join(',')];
  recs.slice().sort((a,b)=> a.date<b.date?-1:1).forEach(r=>{
    const earned=(empWageMap[r.employeeName]||0)*dayValue(r.workStatus);
    const payment=earned+(Number(r.transportCost)||0)+(Number(r.remoteCost)||0);
    lines.push([
      r.date, r.employeeName, r.siteName, r.startTime, r.endTime,
      r.breakMinutes, fmtMin(workMinutes(r)), STATUS_LABEL[r.workStatus],
      earned, r.transportCost, r.remoteCost, payment, r.memo,
      fmtDateTime(r.createdAt), fmtDateTime(r.updatedAt)
    ].map(csvCell).join(','));
  });
  // Excel(日本語)向けに BOM 付き UTF-8
  const blob=new Blob(['﻿'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='勤怠_'+ym+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast('CSVを書き出しました');
}

/* ---------- Shift-JIS エンコーダ（TextDecoder逆引き方式・外部ライブラリ不要） ---------- */
let _sjisMap = null;
function buildSjisMap() {
  const map = {};
  const dec = new TextDecoder('shift-jis', {fatal: false});
  // 半角カタカナ（1バイト: 0xA1-0xDF）
  for (let b = 0xA1; b <= 0xDF; b++) {
    const s = dec.decode(new Uint8Array([b]));
    if (s.length === 1 && s.charCodeAt(0) > 0x7F) map[s.charCodeAt(0)] = b;
  }
  // 2バイト文字（全角・漢字等）
  const buf = new Uint8Array(2);
  for (let b1 = 0x81; b1 <= 0xFC; b1++) {
    if (b1 >= 0xA0 && b1 <= 0xDF) continue; // 半角カタカナ領域はスキップ
    buf[0] = b1;
    for (let b2 = 0x40; b2 <= 0xFC; b2++) {
      if (b2 === 0x7F) continue;
      buf[1] = b2;
      const s = dec.decode(buf);
      if (s.length === 1 && s.charCodeAt(0) > 0xFF) {
        const cp = s.charCodeAt(0);
        if (!(cp in map)) map[cp] = (b1 << 8) | b2;
      }
    }
  }
  return map;
}
function strToShiftJIS(str) {
  if (!_sjisMap) _sjisMap = buildSjisMap();
  const bytes = [];
  for (let i = 0; i < str.length; i++) {
    const cp = str.charCodeAt(i);
    if (cp < 0x80) {
      bytes.push(cp);
    } else if (cp in _sjisMap) {
      const v = _sjisMap[cp];
      if (v > 0xFF) { bytes.push(v >>> 8, v & 0xFF); } else { bytes.push(v); }
    } else {
      bytes.push(0x3F); // '?' 変換不能文字
    }
  }
  return new Uint8Array(bytes);
}

/* ---------- 弥生青色申告用 TXT出力（Shift-JIS・6列形式・実ファイル互換） ---------- */
/* 列構成: "日付","勘定科目","借方"/"貸方","補助科目","","金額"  ヘッダー行なし */
function exportYayoiCsv(recs, ym, empWageMap={}, expenseAccount='旅費交通費', creditAccount='普通預金', empBankMap={}){
  const [y, m] = ym.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const dateStr = `${y}/${pad2(m)}/${pad2(lastDay)}`; // YYYY/MM/DD

  // 従業員別に給与（基本日当＋残業代）・交通費・遠方経費を集計
  const byEmp = {};
  recs.forEach(r => {
    const name = r.employeeName || '従業員';
    const wage = empWageMap[r.employeeName] || 0;
    const earned = wage * dayValue(r.workStatus);
    const otHours = Number(r.overtimeHours) || 0;
    const otPay = Math.floor(otHours * (wage / 8 * 1.25));
    const trans = Number(r.transportCost) || 0;
    const remote = Number(r.remoteCost) || 0;
    if(!byEmp[name]) byEmp[name] = {salary:0, transport:0, remote:0};
    byEmp[name].salary += earned + otPay;
    byEmp[name].transport += trans;
    byEmp[name].remote += remote;
  });

  // 全フィールドをダブルクォートで囲む・ヘッダーなし（実ファイルと同じ形式）
  const q = v => `"${String(v).replace(/"/g, '""')}"`;
  const makeRow = (account, side, sub, amount) =>
    [q(dateStr), q(account), q(side), q(sub), q(''), q(amount)].join(',');

  const lines = [];
  Object.keys(byEmp).sort().forEach(name => {
    const e = byEmp[name];
    const bankName = empBankMap[name] || '';
    if(e.salary > 0){
      lines.push(makeRow('給料手当',    '借方', name,     e.salary));
      lines.push(makeRow(creditAccount, '貸方', bankName, e.salary));
    }
    if(e.transport > 0){
      lines.push(makeRow(expenseAccount, '借方', name,     e.transport));
      lines.push(makeRow(creditAccount,  '貸方', bankName, e.transport));
    }
    if(e.remote > 0){
      lines.push(makeRow(expenseAccount, '借方', name,     e.remote));
      lines.push(makeRow(creditAccount,  '貸方', bankName, e.remote));
    }
  });

  // Shift-JISエンコードして.txtとして出力（弥生インポート仕様に合わせる）
  const sjisBytes = strToShiftJIS(lines.join('\r\n'));
  const blob = new Blob([sjisBytes], {type: 'text/plain;charset=shift_jis'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '弥生_' + ym + '.txt';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast('弥生TXTを書き出しました（Shift-JIS）');
}
